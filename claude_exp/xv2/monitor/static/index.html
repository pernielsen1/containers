<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monitor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0f1117; color: #d1d5db; min-height: 100vh; font-size: 14px; }

/* header */
header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px;
         background: #161b27; border-bottom: 1px solid #21283a; gap: 12px; flex-wrap: wrap; }
header h1 { font-size: 1rem; font-weight: 600; color: #f3f4f6; letter-spacing: .02em; }
.hdr-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
#start-msg { font-size: .8rem; color: #60a5fa; }

/* buttons */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border: none;
       border-radius: 6px; cursor: pointer; font-size: .82rem; font-weight: 500;
       transition: filter .15s; white-space: nowrap; }
.btn:hover:not(:disabled) { filter: brightness(1.15); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-green  { background: #166534; color: #bbf7d0; }
.btn-red    { background: #7f1d1d; color: #fecaca; }
.btn-blue   { background: #1e3a5f; color: #bfdbfe; }
.btn-amber  { background: #78350f; color: #fde68a; }
.btn-sm     { padding: 4px 10px; font-size: .76rem; }

/* sections */
.section { padding: 20px 24px 0; }
.section-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.section-hdr h2 { font-size: .82rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #6b7280; }
.section-hdr::after { content: ''; flex: 1; height: 1px; background: #21283a; }

/* actor grid */
.actors { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }
.card { background: #161b27; border: 1px solid #21283a; border-radius: 10px; padding: 14px; }
.card-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.card-hdr-compact { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: #374151; flex-shrink: 0;
       transition: background .3s, box-shadow .3s; }
.dot.up   { background: #22c55e; box-shadow: 0 0 7px #22c55e99; }
.dot.idle { background: #f59e0b; box-shadow: 0 0 7px #f59e0b99; }
.dot.down { background: #ef4444; box-shadow: none; }
.card-name { font-size: .88rem; font-weight: 600; color: #f3f4f6; }
.stat-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 12px;
             font-size: .78rem; margin-bottom: 12px; }
.stat-grid-compact { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #1a2030; }
.sl { color: #6b7280; }
.sv { text-align: right; font-variant-numeric: tabular-nums; color: #d1d5db; }
.card-foot { display: flex; flex-direction: column; gap: 8px; width: 100%; }

/* runner panel */
.runner { margin: 20px 24px 24px; background: #161b27; border: 1px solid #21283a;
          border-radius: 10px; padding: 18px; }
.runner h2 { font-size: .9rem; font-weight: 600; color: #93c5fd; margin-bottom: 14px; }
.runner-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; }
.runner-label { font-size: .78rem; color: #6b7280; white-space: nowrap; }
.file-btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px;
            background: #1e3a5f; color: #bfdbfe; border-radius: 6px; cursor: pointer;
            font-size: .82rem; font-weight: 500; transition: filter .15s; }
.file-btn:hover { filter: brightness(1.15); }
#file-name { font-size: .78rem; color: #6b7280; }
input[type=file] { display: none; }
select { background: #1e293b; color: #d1d5db; border: 1px solid #374151; border-radius: 6px;
         padding: 7px 10px; font-size: .82rem; cursor: pointer; }
select:focus { outline: 2px solid #3b82f6; outline-offset: 1px; }
select:disabled { opacity: .45; cursor: not-allowed; }
.or-sep { font-size: .75rem; color: #4b5563; padding: 0 2px; }
.toggle { display: flex; align-items: center; gap: 6px; margin-left: auto;
          font-size: .82rem; color: #9ca3af; cursor: pointer; user-select: none; }
.toggle input { width: 15px; height: 15px; cursor: pointer; accent-color: #3b82f6; }
#run-msg { font-size: .78rem; color: #60a5fa; min-height: 18px; margin-bottom: 8px; }

/* results */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .78rem; }
thead tr { background: #1e293b; }
th { padding: 8px 10px; text-align: left; color: #93c5fd; font-weight: 600;
     border-bottom: 1px solid #21283a; white-space: nowrap; }
td { padding: 6px 10px; border-bottom: 1px solid #1a2030; vertical-align: top; }
tr:last-child td { border-bottom: none; }
.ok   { color: #22c55e; font-weight: 600; }
.fail { color: #ef4444; font-weight: 600; }
.f47  { font-size: .72rem; color: #9ca3af; word-break: break-all; max-width: 300px; }
.empty { padding: 20px; text-align: center; color: #4b5563; }

/* spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; width: 12px; height: 12px; border: 2px solid #374151;
        border-top-color: #60a5fa; border-radius: 50%; animation: spin .7s linear infinite; }

/* log level select on cards */
.log-level-sel { background: #1e293b; color: #d1d5db; border: 1px solid #374151;
                 border-radius: 5px; padding: 3px 6px; font-size: .72rem; cursor: pointer; }
.log-level-sel:disabled { opacity: .4; cursor: not-allowed; }

/* connection row (router cards only) */
.conn-row { display: flex; gap: 18px; margin-bottom: 10px; }
.conn-item { display: flex; align-items: center; gap: 5px;
             font-size: .75rem; color: #6b7280; }
.conn-row-compact { display: flex; gap: 12px; margin-bottom: 10px; align-items: center; }
.conn-item-compact { display: flex; align-items: center; gap: 4px; font-size: .73rem; color: #6b7280; }
.dot-sm { width: 7px; height: 7px; border-radius: 50%; background: #374151; flex-shrink: 0;
          transition: background .3s, box-shadow .3s; }
.dot-sm.up   { background: #22c55e; box-shadow: 0 0 6px #22c55e99; }
.dot-sm.down { background: #ef4444; box-shadow: none; }

/* modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65);
                 z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #161b27; border: 1px solid #21283a; border-radius: 12px;
         width: min(860px, 95vw); max-height: 90vh; display: flex; flex-direction: column; }
.modal-hdr { display: flex; align-items: center; justify-content: space-between;
             padding: 14px 18px; border-bottom: 1px solid #21283a; }
.modal-title { font-size: .9rem; font-weight: 600; color: #93c5fd; }
.modal-close { background: none; border: none; color: #6b7280; font-size: 1.2rem;
               cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px; }
.modal-close:hover { color: #d1d5db; background: #21283a; }
.log-pre { flex: 1; overflow-y: auto; margin: 0; padding: 12px 16px;
           font-family: 'Cascadia Code', 'Fira Mono', monospace; font-size: .72rem;
           line-height: 1.5; color: #86efac; background: #0b0f18;
           white-space: pre-wrap; word-break: break-all; min-height: 120px; max-height: 420px; }
.modal-foot { display: flex; align-items: center; gap: 8px; padding: 12px 18px;
              border-top: 1px solid #21283a; flex-wrap: wrap; }
.modal-foot .toggle { font-size: .78rem; color: #9ca3af; }

/* partner groups */
.partner-group { background: #161b27; border: 1px solid #21283a; border-radius: 10px;
                 padding: 14px 16px; margin-bottom: 20px; }
.partner-hdr-row { padding: 8px 0; border-bottom: 1px solid #21283a; margin-bottom: 14px; }
.partner-hdr-row h3 { font-size: .9rem; font-weight: 600; color: #93c5fd; }
.partner-routers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
                        gap: 14px; padding-top: 0; overflow-x: auto; padding-bottom: 8px; }
.partner-routers-grid::-webkit-scrollbar { height: 6px; }
.partner-routers-grid::-webkit-scrollbar-track { background: #0f1117; border-radius: 3px; }
.partner-routers-grid::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
.partner-routers-grid::-webkit-scrollbar-thumb:hover { background: #4b5563; }
.partner-routers-grid .card { background: #0f1117; border: 1px solid #1a2030; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <h1>ISO 8583 Monitor</h1>
  <div class="hdr-right">
    <span id="start-msg"></span>
    <button class="btn btn-green" id="btn-start-all" onclick="startAll()">&#9654; Start All</button>
    <button class="btn btn-red"   id="btn-stop-all"  onclick="stopAll()">&#9632; Stop All</button>
  </div>
</header>

<div class="section" id="section-partners" style="display:none">
  <div class="section-hdr"><h2>Router Partners</h2></div>
  <div id="partners-container"></div>
</div>

<div class="section" id="section-simulators" style="display:none">
  <div class="section-hdr"><h2>Simulators</h2></div>
  <div class="actors" id="simulators-grid"></div>
</div>

<div class="runner" id="runner" style="display:none">
  <h2>Test Runner</h2>

  <div class="runner-row">
    <span class="runner-label">Upstream</span>
    <select id="upstream-select" onchange="onUpstreamChosen(this)">
      <option value="">— select upstream —</option>
    </select>
  </div>

  <div class="runner-row">
    <select id="csv-select" onchange="onSelectChosen(this)" disabled>
      <option value="">— project CSV files —</option>
    </select>
    <button class="btn btn-blue btn-sm" onclick="loadCsvList()" title="Rescan project files">&#8635;</button>
    <div class="or-sep">or</div>
    <label class="file-btn" for="csv-input" title="Browse local filesystem">&#128194; Browse&#8230;</label>
    <input type="file" id="csv-input" accept=".csv" onchange="onFileChosen(this)" disabled>
    <span id="file-name" style="display:none"></span>
    <button class="btn btn-blue"  id="btn-upload"    onclick="uploadCsv()"  disabled>Upload</button>
    <button class="btn btn-green" id="btn-start-run" onclick="startRun()"   disabled>&#9654; Start</button>
    <button class="btn btn-blue btn-sm" onclick="fetchResults()">&#8635; Refresh</button>
    <label class="toggle" title="Automatically refresh results every second">
      <input type="checkbox" id="auto-refresh" onchange="onAutoRefreshChange(this)">
      Auto-refresh
    </label>
  </div>

  <div id="run-msg"></div>
  <div class="tbl-wrap">
    <table id="results-table" style="display:none">
      <thead><tr><th>PAN</th><th>RC</th><th>Auth</th><th>Field 47</th></tr></thead>
      <tbody id="results-body"></tbody>
    </table>
    <div id="no-results" class="empty">No results yet.</div>
  </div>
</div>

<!-- log viewer modal -->
<div class="modal-overlay" id="log-modal" onclick="closeLogModal(event)">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="log-modal-title">Logs</span>
      <button class="modal-close" onclick="closeLogModal()">&#x2715;</button>
    </div>
    <pre class="log-pre" id="log-pre"></pre>
    <div class="modal-foot">
      <button class="btn btn-blue btn-sm" onclick="refreshLogs()">&#8635; Refresh</button>
      <button class="btn btn-blue btn-sm" onclick="scrollLogsBottom()">&#8681; Bottom</button>
      <button class="btn btn-blue btn-sm" onclick="exportLogs()">&#8659; Export</button>
      <label class="toggle" style="margin-left:auto">
        <input type="checkbox" id="log-auto-refresh" checked onchange="onLogAutoRefreshChange(this)">
        Auto-refresh
      </label>
    </div>
  </div>
</div>

<script>
// ── state ──────────────────────────────────────────────────────────────────
let actors = [];
let partnersData = {};
let selectedUpstream = null;
let pollTimer = null;
let resultsTimer = null;
let autoRefresh = true;

// ── init ───────────────────────────────────────────────────────────────────
async function init() {
  const saved = localStorage.getItem('autoRefresh');
  autoRefresh = saved === null ? true : saved === 'true';
  document.getElementById('auto-refresh').checked = autoRefresh;

  const r = await fetch('/api/actors');
  actors = await r.json();
  await renderSections();
  startStatusPoll();
  loadCsvList();
}

// ── sections ───────────────────────────────────────────────────────────────
async function renderSections() {
  const routers    = actors.filter(a => a.type === 'router');
  const simulators = actors.filter(a => a.type !== 'router');
  const upstreams  = actors.filter(a => a.type === 'upstream');

  if (routers.length) {
    try {
      const r = await fetch('/api/routers_by_partner');
      const partners = await r.json();
      if (Object.keys(partners).length > 0) {
        document.getElementById('section-partners').style.display = 'block';
        renderPartners(partners, routers);
      }
    } catch (_) {}
  }
  if (simulators.length) {
    document.getElementById('section-simulators').style.display = 'block';
    renderCards(document.getElementById('simulators-grid'), simulators);
  }
  if (upstreams.length) {
    document.getElementById('runner').style.display = 'block';
    const sel = document.getElementById('upstream-select');
    for (const a of upstreams) {
      const opt = document.createElement('option');
      opt.value = a.name; opt.textContent = a.name;
      sel.appendChild(opt);
    }
    if (upstreams.length === 1) {
      sel.value = upstreams[0].name;
      onUpstreamChosen(sel);
    }
  }
}

function renderCards(grid, list) {
  grid.innerHTML = '';
  for (const a of list) {
    const d = document.createElement('div');
    d.className = 'card'; d.id = `card-${a.name}`;
    const connRow = a.type === 'router' ? `
      <div class="conn-row">
        <span class="conn-item"><span class="dot-sm" id="upconn-${a.name}"></span>upstream</span>
        <span class="conn-item"><span class="dot-sm" id="dsconn-${a.name}"></span>downstream</span>
      </div>` : '';
    d.innerHTML = `
      <div class="card-hdr">
        <div class="dot" id="dot-${a.name}"></div>
        <div class="card-name">${a.name}</div>
      </div>
      ${connRow}
      <div class="stat-grid">
        <span class="sl">30s/60s</span><span class="sv"><span id="s30-${a.name}">&#8212;</span>/<span id="r30-${a.name}">&#8212;</span> <span id="s60-${a.name}">&#8212;</span>/<span id="r60-${a.name}">&#8212;</span></span>
        <span class="sl">total</span><span class="sv"><span id="stot-${a.name}">&#8212;</span>/<span id="rtot-${a.name}">&#8212;</span> <span id="age-${a.name}" style="color:#9ca3af">—</span></span>
      </div>
      <div class="card-foot" style="gap:6px;flex-wrap:wrap">
        <select class="log-level-sel" id="lvl-${a.name}" disabled
                onchange="setLogLevel('${a.name}', this.value)">
          <option>DEBUG</option><option>INFO</option>
          <option>WARNING</option><option>ERROR</option>
        </select>
        <button class="btn btn-blue btn-sm" onclick="openLogModal('${a.name}')" disabled
                id="btn-logs-${a.name}">Logs</button>
        <button class="btn btn-green btn-sm" onclick="launchActor('${a.name}')">Start</button>
        <button class="btn btn-amber btn-sm" onclick="stopActor('${a.name}')">Stop</button>
      </div>`;
    grid.appendChild(d);
  }
}

function renderPartners(pdata, allRouters) {
  partnersData = pdata;
  const container = document.getElementById('partners-container');
  container.innerHTML = '';
  const partners = Object.keys(partnersData).sort();

  for (const partnerId of partners) {
    const partnerRouters = partnersData[partnerId];
    const div = document.createElement('div');
    div.className = 'partner-group';

    const hdrDiv = document.createElement('div');
    hdrDiv.className = 'partner-hdr-row';
    const routerNames = partnerRouters.map(r => r.name).join(', ');
    hdrDiv.innerHTML = `
      <div style="display: flex; align-items: center; gap: 24px; width: 100%;">
        <h3 style="margin: 0; min-width: 120px;">${partnerId}</h3>
        <div style="display: flex; gap: 40px; flex: 1; font-size: .82rem;">
          <div style="display: flex; gap: 8px;">
            <span style="color: #6b7280;">30s:</span>
            <span style="font-variant-numeric: tabular-nums;"><span id="p-s30-${partnerId}">—</span>/<span id="p-r30-${partnerId}">—</span></span>
          </div>
          <div style="display: flex; gap: 8px;">
            <span style="color: #6b7280;">Total:</span>
            <span style="font-variant-numeric: tabular-nums;"><span id="p-stot-${partnerId}">—</span>/<span id="p-rtot-${partnerId}">—</span></span>
          </div>
        </div>
      </div>
    `;

    const routersGrid = document.createElement('div');
    routersGrid.className = 'partner-routers-grid';

    const routersInPartner = allRouters.filter(r => partnerRouters.some(pr => pr.name === r.name));
    for (const router of routersInPartner) {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${router.name}`;

      const connRow = `
        <div class="conn-row-compact">
          <span class="conn-item-compact"><span class="dot-sm" id="upconn-${router.name}"></span>up</span>
          <span class="conn-item-compact"><span class="dot-sm" id="dsconn-${router.name}"></span>down</span>
        </div>`;

      card.innerHTML = `
        <div class="card-hdr-compact">
          <div style="display: flex; align-items: center; gap: 8px;">
            <div class="dot" id="dot-${router.name}"></div>
            <div class="card-name">${router.name}</div>
          </div>
          ${connRow}
        </div>
        <div class="stat-grid-compact">
          <div style="display: flex; gap: 20px; font-size: .78rem;">
            <div><span style="color: #6b7280;">30s/60s:</span> <span style="font-variant-numeric: tabular-nums;"><span id="s30-${router.name}">—</span>/<span id="r30-${router.name}">—</span> <span id="s60-${router.name}">—</span>/<span id="r60-${router.name}">—</span></span></div>
            <div><span style="color: #6b7280;">Total:</span> <span style="font-variant-numeric: tabular-nums;"><span id="stot-${router.name}">—</span>/<span id="rtot-${router.name}">—</span></span> <span id="age-${router.name}" style="color:#9ca3af; font-size:.7rem">—</span></div>
          </div>
        </div>
        <div class="card-foot">
          <div style="display: flex; gap: 6px; width: 100%; margin-bottom: 8px;">
            <button class="btn btn-green btn-sm" onclick="launchActor('${router.name}')" style="flex: 1;">Start</button>
            <button class="btn btn-amber btn-sm" onclick="stopActor('${router.name}')" style="flex: 1;">Stop</button>
          </div>
          <div style="width: 100%; display: flex; flex-direction: column; gap: 6px;">
            <select class="log-level-sel" id="lvl-${router.name}" disabled onchange="setLogLevel('${router.name}', this.value)" style="width: 100%;">
              <option>DEBUG</option><option>INFO</option>
              <option>WARNING</option><option>ERROR</option>
            </select>
            <button class="btn btn-blue btn-sm" onclick="openLogModal('${router.name}')" disabled id="btn-logs-${router.name}" style="width: 100%;">📋 Logs</button>
          </div>
        </div>`;
      routersGrid.appendChild(card);
    }

    div.appendChild(hdrDiv);
    div.appendChild(routersGrid);
    container.appendChild(div);
  }
}

// ── status polling ─────────────────────────────────────────────────────────
function startStatusPoll() {
  clearInterval(pollTimer);
  pollOnce();
  pollTimer = setInterval(pollOnce, 2000);
}

async function pollOnce() {
  try {
    const [statusRes, startingRes] = await Promise.all([
      fetch('/api/status'),
      fetch('/api/starting'),
    ]);
    const statuses = await statusRes.json();
    const starting = (await startingRes.json()).starting;

    const msg = document.getElementById('start-msg');
    if (starting) {
      if (!msg.querySelector('.spin')) msg.innerHTML = '<span class="spin"></span> Starting actors…';
    } else if (msg.querySelector('.spin')) {
      msg.textContent = '';
    }

    for (const [name, st] of Object.entries(statuses)) {
      const dot = document.getElementById(`dot-${name}`);
      const cls = st === 'green' ? 'up' : st === 'yellow' ? 'idle' : 'down';
      if (dot) dot.className = 'dot ' + cls;
      if (st !== 'red') fetchStats(name); else clearStats(name);
      const pdot = document.getElementById(`dot-p-${name}`);
      if (pdot) pdot.className = 'dot ' + cls;
    }
    updatePartnerStats();
  } catch (e) {
    console.error('pollOnce error:', e);
  }
}

function updatePartnerStats() {
  const partners = Object.keys(partnersData || {});
  const routerStats = {};

  const routers = actors.filter(a => a.type === 'router');
  for (const router of routers) {
    const name = router.name;
    const s30 = document.getElementById(`s30-${name}`);
    const r30 = document.getElementById(`r30-${name}`);
    const stot = document.getElementById(`stot-${name}`);
    const rtot = document.getElementById(`rtot-${name}`);
    routerStats[name] = {
      s30: parseInt(s30?.textContent) || 0,
      r30: parseInt(r30?.textContent) || 0,
      stot: parseInt(stot?.textContent) || 0,
      rtot: parseInt(rtot?.textContent) || 0,
    };
  }

  for (const partnerId of partners) {
    const partnerRouters = (partnersData[partnerId] || []).map(r => r.name);
    let ps30 = 0, pr30 = 0, pstot = 0, prtot = 0;
    for (const routerName of partnerRouters) {
      const stats = routerStats[routerName];
      if (stats) {
        ps30 += stats.s30;
        pr30 += stats.r30;
        pstot += stats.stot;
        prtot += stats.rtot;
      }
    }
    const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v > 0 ? v : '—'; };
    set(`p-s30-${partnerId}`, ps30);
    set(`p-r30-${partnerId}`, pr30);
    set(`p-stot-${partnerId}`, pstot);
    set(`p-rtot-${partnerId}`, prtot);
  }
}

const _levelFetched = new Set();

async function fetchStats(name) {
  try {
    const r = await fetch(`/api/actor/${name}/stats`);
    if (!r.ok) return;
    const s = await r.json();
    const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v ?? '—'; };
    set(`s30-${name}`, s.sent_30s);
    set(`r30-${name}`, s.recv_30s);
    set(`s60-${name}`, s.sent_60s);
    set(`r60-${name}`, s.recv_60s);
    set(`stot-${name}`, s.sent_total);
    set(`rtot-${name}`, s.recv_total);

    // show actual time of last message
    const el = document.getElementById(`age-${name}`);
    if (el) el.textContent = s.last_recv_datetime || '—';

    // connection dots (router cards only — elements absent for other actor types)
    const connCls = (v) => {
      if (v === true) return 'dot-sm up';
      if (v === false) return 'dot-sm down';
      return 'dot-sm';  // unknown state, gray
    };
    const upEl = document.getElementById(`upconn-${name}`);
    const dsEl = document.getElementById(`dsconn-${name}`);
    if (upEl) {
      const upStatus = s.connections?.upstream;
      upEl.className = connCls(upStatus);
    }
    if (dsEl) {
      const dsStatus = s.connections?.downstream;
      dsEl.className = connCls(dsStatus);
    }

    // enable log controls; fetch current level once per session
    const sel = document.getElementById(`lvl-${name}`);
    const btn = document.getElementById(`btn-logs-${name}`);
    if (sel) sel.disabled = false;
    if (btn) btn.disabled = false;
    if (!_levelFetched.has(name)) {
      _levelFetched.add(name);
      fetch(`/api/actor/${name}/log_level`)
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d?.level && sel) sel.value = d.level; })
        .catch(() => {});
    }
  } catch (_) {}
}

function clearStats(name) {
  ['s30', 'r30', 's60', 'r60', 'stot', 'rtot', 'age'].forEach(p => {
    const el = document.getElementById(`${p}-${name}`);
    if (el) el.textContent = '—';
  });
  // reset connection dots to grey (unknown)
  ['upconn', 'dsconn'].forEach(p => {
    const el = document.getElementById(`${p}-${name}`);
    if (el) el.className = 'dot-sm';
  });
  _levelFetched.delete(name);
  const sel = document.getElementById(`lvl-${name}`);
  const btn = document.getElementById(`btn-logs-${name}`);
  if (sel) sel.disabled = true;
  if (btn) btn.disabled = true;
}

// ── global controls ────────────────────────────────────────────────────────
async function startAll() {
  const btn = document.getElementById('btn-start-all');
  btn.disabled = true;
  try {
    const r = await fetch('/api/start_all', { method: 'POST' });
    if (r.status === 409) {
      document.getElementById('start-msg').textContent = 'Already starting…';
      setTimeout(() => { document.getElementById('start-msg').textContent = ''; }, 3000);
    }
  } finally {
    btn.disabled = false;
  }
}

async function stopAll() {
  if (!confirm('Stop all actors?')) return;
  await fetch('/api/stop_all', { method: 'POST' }).catch(() => {});
}

async function launchActor(name) {
  await fetch(`/api/actor/${name}/launch`, { method: 'POST' }).catch(() => {});
}

async function stopActor(name) {
  await fetch(`/api/actor/${name}/stop`, { method: 'POST' }).catch(() => {});
}

// ── upstream selection ─────────────────────────────────────────────────────
function onUpstreamChosen(sel) {
  selectedUpstream = sel.value || null;
  const hasSel = !!selectedUpstream;
  document.getElementById('csv-select').disabled = !hasSel;
  document.getElementById('csv-input').disabled  = !hasSel;
  if (hasSel) loadCsvList();
  clearResults();
  document.getElementById('btn-upload').disabled    = true;
  document.getElementById('btn-start-run').disabled = true;
  document.getElementById('run-msg').textContent    = '';
}

// ── test runner ────────────────────────────────────────────────────────────
async function loadCsvList() {
  const sel = document.getElementById('csv-select');
  try {
    const r     = await fetch('/api/csv_files');
    const files = await r.json();
    const prev  = sel.value;
    sel.innerHTML = '<option value="">&#8212; project CSV files &#8212;</option>';
    for (const f of files) {
      const opt = document.createElement('option');
      opt.value = f; opt.textContent = f;
      if (f === prev) opt.selected = true;
      sel.appendChild(opt);
    }
    if (sel.value && selectedUpstream) document.getElementById('btn-upload').disabled = false;
  } catch (_) {}
}

function onSelectChosen(sel) {
  const hasFile = !!sel.value;
  document.getElementById('btn-upload').disabled = !(hasFile && selectedUpstream);
  if (hasFile) {
    document.getElementById('csv-input').value = '';
    document.getElementById('file-name').style.display = 'none';
  }
}

function onFileChosen(input) {
  const name = input.files[0]?.name;
  const fn = document.getElementById('file-name');
  fn.textContent = name ?? '';
  fn.style.display = name ? 'inline' : 'none';
  document.getElementById('btn-upload').disabled = !(input.files[0] && selectedUpstream);
  if (input.files[0]) document.getElementById('csv-select').value = '';
}

async function uploadCsv() {
  if (!selectedUpstream) return;
  const msg    = document.getElementById('run-msg');
  const selVal = document.getElementById('csv-select').value;
  const input  = document.getElementById('csv-input');

  try {
    let r;
    if (selVal) {
      r = await fetch(`/api/actor/${selectedUpstream}/upload_path`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: selVal }),
      });
    } else if (input.files[0]) {
      const form = new FormData();
      form.append('file', input.files[0]);
      r = await fetch(`/api/actor/${selectedUpstream}/upload`, { method: 'POST', body: form });
    } else {
      msg.textContent = '✗ No file selected'; return;
    }
    const data = await r.json();
    if (r.ok) {
      msg.textContent = `✓ Uploaded — ${data.status ?? 'ok'}`;
      document.getElementById('btn-start-run').disabled = false;
    } else {
      msg.textContent = `✗ Upload error: ${data.error ?? r.status}`;
    }
  } catch (e) {
    msg.textContent = '✗ ' + e.message;
  }
}

async function startRun() {
  if (!selectedUpstream) return;
  const msg = document.getElementById('run-msg');
  clearResults();
  try {
    const r    = await fetch(`/api/actor/${selectedUpstream}/start`);
    const data = await r.json();
    if (r.ok) {
      msg.textContent = `▶ Run started — ${data.rows} messages`;
      if (autoRefresh) startResultsPoll();
    } else {
      msg.textContent = `✗ Start error: ${data.error ?? r.status}`;
    }
  } catch (e) {
    msg.textContent = '✗ ' + e.message;
  }
}

// ── results ────────────────────────────────────────────────────────────────
function startResultsPoll() {
  clearInterval(resultsTimer);
  fetchResults();
  resultsTimer = setInterval(fetchResults, 1000);
}

async function fetchResults() {
  if (!selectedUpstream) return;
  try {
    const r = await fetch(`/api/actor/${selectedUpstream}/results`);
    if (!r.ok) return;
    renderResults(await r.json());
  } catch (_) {}
}

function clearResults() {
  document.getElementById('results-body').innerHTML = '';
  document.getElementById('results-table').style.display = 'none';
  document.getElementById('no-results').style.display  = 'block';
}

function renderResults(rows) {
  const tbody = document.getElementById('results-body');
  const table = document.getElementById('results-table');
  const empty = document.getElementById('no-results');
  if (!rows || rows.length === 0) {
    table.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  table.style.display = 'table';
  empty.style.display = 'none';

  const sorted = [...rows].sort((a, b) => (a['2'] ?? '').localeCompare(b['2'] ?? ''));
  tbody.innerHTML = '';
  for (const row of sorted) {
    const rc  = row.resp_39 ?? '?';
    const f47 = row.resp_47 ?? '';
    const tr  = document.createElement('tr');
    tr.innerHTML = `
      <td>${row['2'] ?? ''}</td>
      <td class="${rc === '00' ? 'ok' : 'fail'}">${rc}</td>
      <td>${row.resp_38 ?? ''}</td>
      <td class="f47">${escHtml(f47)}</td>`;
    tbody.appendChild(tr);
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function onAutoRefreshChange(cb) {
  autoRefresh = cb.checked;
  localStorage.setItem('autoRefresh', autoRefresh);
  if (!autoRefresh) { clearInterval(resultsTimer); resultsTimer = null; }
}

// ── log level ──────────────────────────────────────────────────────────────
async function setLogLevel(name, level) {
  try {
    await fetch(`/api/actor/${name}/log_level`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ level }),
    });
  } catch (_) {}
}

// ── log viewer modal ───────────────────────────────────────────────────────
let _logActor = null;
let _logTimer = null;

async function openLogModal(name) {
  _logActor = name;
  document.getElementById('log-modal-title').textContent = `Logs — ${name}`;
  document.getElementById('log-pre').textContent = 'Loading…';
  document.getElementById('log-modal').classList.add('open');
  await refreshLogs();
  if (document.getElementById('log-auto-refresh').checked) startLogPoll();
}

function closeLogModal(event) {
  if (event && event.target !== document.getElementById('log-modal')) return;
  stopLogPoll();
  _logActor = null;
  document.getElementById('log-modal').classList.remove('open');
}

function startLogPoll() {
  stopLogPoll();
  _logTimer = setInterval(refreshLogs, 2000);
}

function stopLogPoll() {
  if (_logTimer) { clearInterval(_logTimer); _logTimer = null; }
}

async function refreshLogs() {
  if (!_logActor) return;
  try {
    const r = await fetch(`/api/actor/${_logActor}/logs`);
    if (!r.ok) {
      document.getElementById('log-pre').textContent = `Error: ${r.status}`;
      return;
    }
    const data = await r.json();
    const lines = Array.isArray(data) ? data : (data.error ? [data.error] : []);
    if (lines.length === 0) {
      document.getElementById('log-pre').textContent = '(no logs)';
      return;
    }
    const pre = document.getElementById('log-pre');
    const atBottom = pre.scrollHeight - pre.scrollTop <= pre.clientHeight + 4;
    pre.textContent = lines.join('\n');
    if (atBottom) pre.scrollTop = pre.scrollHeight;
  } catch (e) {
    document.getElementById('log-pre').textContent = `Error: ${e.message}`;
  }
}

function scrollLogsBottom() {
  const pre = document.getElementById('log-pre');
  pre.scrollTop = pre.scrollHeight;
}

async function exportLogs() {
  if (!_logActor) return;
  try {
    const r = await fetch(`/api/actor/${_logActor}/logs?format=text`);
    const text = await r.text();
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${_logActor}_${ts}.log`;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (_) {}
}

function onLogAutoRefreshChange(cb) {
  if (cb.checked) startLogPoll(); else stopLogPoll();
}

init();
</script>
